<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark:      #0f1623;
    --navy:      #1B2B4B;
    --teal:      #0D7377;
    --teal-b:    #14A085;
    --gold:      #C9A84C;
    --gold-lt:   #e0c070;
    --white:     #ffffff;
    --off:       #F8FAFB;
    --lgray:     #E8ECF2;
    --tgray:     #4B5563;
    --tdark:     #1F2937;
    --pale:      #E6F4F4;
    --font-head: 'Trebuchet MS', sans-serif;
    --font-body: 'Calibri', 'Segoe UI', sans-serif;
    --nav-h:     72px;
    --radius:    12px;
    --trans:     0.3s ease;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--white); color: var(--tdark); line-height: 1.6; }
  img { display: block; max-width: 100%; }
  a { text-decoration: none; color: inherit; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 3px; }

  /* ════════════════════════════════════
     NAV
  ════════════════════════════════════ */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: var(--nav-h);
    background: rgba(15,22,35,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw;
    transition: background var(--trans);
  }
  .nav-logo {
    font-family: var(--font-head);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--white);
  }
  .nav-logo span { color: var(--gold); }
  .nav-links {
    display: flex; align-items: center; gap: 2.5rem;
    list-style: none;
  }
  .nav-links > li { position: relative; }
  .nav-links > li > a, .nav-links > li > button {
    font-family: var(--font-body);
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.82);
    background: none; border: none; cursor: pointer;
    padding: 4px 0;
    transition: color var(--trans);
    display: flex; align-items: center; gap: 6px;
  }
  .nav-links > li > a:hover,
  .nav-links > li > button:hover { color: var(--gold); }
  .nav-links > li > a.active,
  .nav-links > li > button.active { color: var(--gold); }

  /* Dropdown arrow */
  .arrow {
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid currentColor;
    transition: transform var(--trans);
    margin-top: 1px;
  }
  .dropdown-open .arrow { transform: rotate(180deg); }

  /* Dropdown panel */
  .dropdown {
    position: absolute; top: calc(100% + 18px); left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: var(--navy);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    min-width: 290px;
    padding: 8px 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .dropdown.open {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .dropdown::before {
    content: '';
    position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 10px;
    background: var(--navy);
    border-left: 1px solid rgba(201,168,76,0.2);
    border-top: 1px solid rgba(201,168,76,0.2);
    transform: translateX(-50%) rotate(45deg);
  }
  .dropdown-section {
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .dropdown-section:last-child { border-bottom: none; }
  .dropdown-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    padding: 6px 20px 4px;
  }
  .dropdown a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.82);
    transition: background var(--trans), color var(--trans);
    border-radius: 6px;
    margin: 0 6px;
  }
  .dropdown a:hover { background: rgba(13,115,119,0.3); color: var(--white); }
  .dropdown a.coming-soon { opacity: 0.45; cursor: default; pointer-events: none; }
  .dropdown-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(13,115,119,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; flex-shrink: 0;
  }
  .coming-tag {
    margin-left: auto;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--tgray);
    background: rgba(255,255,255,0.06);
    padding: 2px 6px; border-radius: 4px;
  }
  /* Sub-dropdown */
  .sub-dropdown-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.82);
    transition: background var(--trans), color var(--trans);
    border-radius: 6px;
    margin: 0 6px;
    cursor: pointer;
    position: relative;
  }
  .sub-dropdown-toggle:hover { background: rgba(13,115,119,0.3); color: var(--white); }
  .sub-arrow {
    width: 0; height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 5px solid currentColor;
    margin-left: auto;
    transition: transform var(--trans);
  }
  .sub-dropdown {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .sub-dropdown.open { max-height: 320px; }
  .sub-dropdown a {
    padding: 8px 20px 8px 52px;
    font-size: 0.84rem;
    color: rgba(255,255,255,0.65);
  }
  .sub-dropdown a:hover { background: rgba(13,115,119,0.2); color: var(--white); }

  /* CTA button in nav */
  .nav-cta {
    background: var(--teal);
    color: var(--white) !important;
    padding: 9px 20px !important;
    border-radius: 8px;
    font-size: 0.82rem !important;
    font-weight: 700 !important;
    letter-spacing: 0.05em;
    transition: background var(--trans) !important;
  }
  .nav-cta:hover { background: var(--teal-b) !important; color: var(--white) !important; }

  /* ════════════════════════════════════
     HERO
  ════════════════════════════════════ */
  #home {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--dark) 0%, #0d1d35 50%, #0a2030 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: calc(var(--nav-h) + 40px) 5vw 80px;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 20% 50%, rgba(13,115,119,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 30%, rgba(201,168,76,0.08) 0%, transparent 55%);
  }
  .hero-grid {
    position: absolute; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .hero-content { position: relative; z-index: 1; max-width: 860px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 28px;
  }
  .hero-badge::before { content: '●'; font-size: 0.5rem; color: var(--teal-b); }
  h1.hero-title {
    font-family: var(--font-head);
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 700;
    color: var(--white);
    line-height: 1.12;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }
  h1.hero-title em { color: var(--gold); font-style: normal; }
  .hero-sub {
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: rgba(255,255,255,0.62);
    max-width: 600px; margin: 0 auto 36px;
    line-height: 1.7;
  }
  .hero-certs {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    margin-bottom: 48px;
  }
  .cert-chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 5px 14px;
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.05em;
    color: rgba(255,255,255,0.65);
  }
  .hero-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--teal);
    color: var(--white);
    padding: 14px 30px;
    border-radius: 10px;
    font-weight: 700; font-size: 0.95rem; letter-spacing: 0.03em;
    transition: background var(--trans), transform 0.2s;
    border: none; cursor: pointer;
  }
  .btn-primary:hover { background: var(--teal-b); transform: translateY(-2px); }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent;
    color: var(--white);
    padding: 14px 30px;
    border-radius: 10px;
    font-weight: 700; font-size: 0.95rem; letter-spacing: 0.03em;
    border: 1.5px solid rgba(255,255,255,0.2);
    transition: border-color var(--trans), color var(--trans), transform 0.2s;
    cursor: pointer;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
  /* Hero value highlights (Free Estimate / Delivery) */
  .hero-highlights {
    display: flex; flex-wrap: wrap; justify-content: center;
    align-items: center; gap: 8px 32px;
    margin-top: 32px;
  }
  .hero-highlight {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em;
    color: var(--white);
  }
  .hi-icon {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; flex-shrink: 0; font-weight: 900;
  }
  .hi-icon-check { background: var(--teal); color: var(--white); }
  .hi-icon-clock { background: rgba(201,168,76,0.2); color: var(--gold); font-size: 0.9rem; }
  .hero-highlight sup {
    font-size: 0.6rem; color: var(--gold);
    vertical-align: super; margin-left: 1px;
  }
  .hero-sep {
    color: rgba(255,255,255,0.18); font-size: 1.4rem; font-weight: 300;
    align-self: center;
  }
  .hero-footnote {
    font-size: 0.72rem; color: rgba(255,255,255,0.3);
    max-width: 540px; margin: 14px auto 0;
    line-height: 1.6; text-align: center;
  }

  .hero-scroll {
    position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    animation: bounce 2s infinite;
  }
  .hero-scroll::after {
    content: '';
    display: block; width: 1px; height: 36px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
  }
  @keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* ════════════════════════════════════
     SECTION WRAPPERS
  ════════════════════════════════════ */
  section { scroll-margin-top: var(--nav-h); }
  .section-inner { max-width: 1200px; margin: 0 auto; padding: 0 5vw; }
  .section-head { text-align: center; margin-bottom: 60px; }
  .section-eyebrow {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--teal);
    margin-bottom: 12px;
  }
  .section-title {
    font-family: var(--font-head);
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700; color: var(--tdark);
    margin-bottom: 14px; line-height: 1.2;
  }
  .section-sub {
    font-size: 1.05rem; color: var(--tgray);
    max-width: 600px; margin: 0 auto;
  }
  .section-divider {
    width: 48px; height: 3px;
    background: linear-gradient(to right, var(--teal), var(--gold));
    margin: 16px auto 0; border-radius: 2px;
  }


  /* ════════════════════════════════════
     PRODUCT DETAIL SECTIONS
  ════════════════════════════════════ */
  .product-section {
    padding: 100px 0;
  }
  .product-section:nth-of-type(odd) { background: var(--white); }
  .product-section:nth-of-type(even) { background: var(--off); }

  /* Hero banner for each product */
  .product-banner {
    background: linear-gradient(135deg, var(--dark) 0%, var(--navy) 100%);
    border-radius: 20px;
    padding: 56px 48px;
    display: grid; grid-template-columns: 1fr auto;
    gap: 40px; align-items: center;
    margin-bottom: 64px;
    position: relative; overflow: hidden;
  }
  .product-banner::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(13,115,119,0.2) 0%, transparent 60%);
    pointer-events: none;
  }
  .pb-num {
    font-family: var(--font-head);
    font-size: 8rem; font-weight: 700;
    color: rgba(255,255,255,0.04); line-height: 1;
    position: absolute; right: 48px; top: 50%; transform: translateY(-50%);
    pointer-events: none;
  }
  .pb-label {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--teal);
    margin-bottom: 10px;
  }
  .pb-title {
    font-family: var(--font-head);
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
    font-weight: 700; color: var(--white);
    line-height: 1.2; margin-bottom: 12px;
  }
  .pb-tagline { font-size: 1rem; color: var(--gold); font-style: italic; margin-bottom: 24px; }
  .pb-specs {
    display: flex; flex-wrap: wrap; gap: 14px;
  }
  .pb-spec {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 20px; text-align: center; min-width: 90px;
  }
  .pb-spec-val {
    font-family: var(--font-head);
    font-size: 1.5rem; font-weight: 700; color: var(--teal);
    line-height: 1;
  }
  .pb-spec-lbl {
    font-size: 0.72rem; color: rgba(255,255,255,0.45);
    margin-top: 4px; letter-spacing: 0.04em;
  }

  /* Features grid */
  .features-title {
    font-family: var(--font-head);
    font-size: 1.5rem; font-weight: 700; color: var(--tdark);
    margin-bottom: 28px;
  }
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
    margin-bottom: 60px;
  }
  .feature-card {
    background: var(--white);
    border: 1px solid var(--lgray);
    border-radius: 14px;
    padding: 24px 22px;
    transition: box-shadow 0.25s, border-color 0.25s;
  }
  .product-section:nth-of-type(even) .feature-card { background: var(--white); }
  .feature-card:hover {
    box-shadow: 0 8px 30px rgba(13,115,119,0.1);
    border-color: rgba(13,115,119,0.25);
  }
  .fc-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .fc-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; flex-shrink: 0;
  }
  .fc-title { font-weight: 700; font-size: 1rem; color: var(--tdark); }
  .fc-body { font-size: 0.88rem; color: var(--tgray); line-height: 1.6; }

  /* Specs table */
  .specs-block {
    background: var(--dark);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 60px;
  }
  .specs-block-head {
    padding: 24px 32px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-family: var(--font-head);
    font-size: 1.2rem; font-weight: 700; color: var(--white);
    display: flex; align-items: center; gap: 10px;
  }
  .specs-block-head::before {
    content: '';
    display: inline-block; width: 4px; height: 20px;
    background: var(--teal); border-radius: 2px;
  }
  .specs-table { width: 100%; border-collapse: collapse; }
  .specs-table tr:nth-child(even) td { background: rgba(27,43,75,0.5); }
  .specs-table td {
    padding: 13px 32px;
    font-size: 0.91rem; color: rgba(255,255,255,0.75);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .specs-table td:first-child { color: rgba(255,255,255,0.45); width: 40%; }
  .specs-table td:last-child { font-weight: 600; color: var(--teal); }
